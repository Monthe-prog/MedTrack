name: MedTrack CI/CD

# =============================================================================
# MedTrack – GitHub Actions Pipeline
# Runs on: push to main/develop, pull requests to main
#
# Jobs:
#   1. lint-backend      → ktlint + detekt
#   2. test-backend      → Ktor unit tests
#   3. lint-android      → Android lint + ktlint
#   4. test-android      → Unit tests (no emulator)
#   5. build-backend     → Gradle fat JAR + Docker image → GHCR
#   6. build-android     → Debug APK (release needs signing keys)
# =============================================================================

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/medtrack-backend

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # 1. Backend Lint
  # ────────────────────────────────────────────────────────────────────────────
  lint-backend:
    name: Backend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon

      - name: Run detekt
        run: ./gradlew detekt --no-daemon

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Backend Tests
  # ────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: lint-backend
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: medtrack_test
          POSTGRES_USER: medtrack_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: medtrack_test
          DB_USER: medtrack_user
          DB_PASSWORD: test_password
          APP_ENV: test
          FIREBASE_PROJECT_ID: medtrack-test
          # Use a test service account or mock
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_TEST_SERVICE_ACCOUNT }}
        run: ./gradlew test --no-daemon

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/build/reports/tests/

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Android Lint
  # ────────────────────────────────────────────────────────────────────────────
  lint-android:
    name: Android — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Run Android lint
        run: ./gradlew lintDebug --no-daemon

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-lint-report
          path: android/app/build/reports/lint-results-debug.html

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Android Unit Tests
  # ────────────────────────────────────────────────────────────────────────────
  test-android:
    name: Android — Unit Tests
    runs-on: ubuntu-latest
    needs: lint-android
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results
          path: android/app/build/reports/tests/

  # ────────────────────────────────────────────────────────────────────────────
  # 5. Build Backend + Push Docker Image to GHCR
  # ────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Backend — Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # 6. Build Android Debug APK
  # ────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android — Build APK
    runs-on: ubuntu-latest
    needs: [test-android]
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Build debug APK
        env:
          ANDROID_API_BASE_URL: ${{ secrets.ANDROID_API_BASE_URL }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: medtrack-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
