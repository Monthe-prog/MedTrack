ktor {
    deployment {
        port       = 8080
        port       = ${?APP_PORT}
        host       = 0.0.0.0
        watch      = [classes, resources]   # hot-reload in dev
    }
    application {
        modules    = [com.joechrist.medtrack.ApplicationKt.module]
    }
}

# These are accessed via System.getenv() in code;
# HOCON config is only used for Ktor engine config above.
# All secrets live in .env / docker-compose environment blocks.
