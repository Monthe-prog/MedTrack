services:
  - type: web
    name: medtrack-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: medtrack-db
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
    healthCheckPath: /health

databases:
  - name: medtrack-db
    plan: free
